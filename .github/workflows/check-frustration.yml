name: Check Frustration Removal Event
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  check-event:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Frustration Removal Event
        id: check
        run: |
          EVENTS=$(curl -s "https://raw.githubusercontent.com/zhenga8533/leak-duck/data/events.json")
          NOW=$(date -u +%s)
          ACTIVE=$(echo "$EVENTS" | jq --arg now "$NOW" '[.[] | .[] | select((.title // "" | ascii_downcase | test("frustration|rocket takeover|team go rocket takeover|forget frustration|remove frustration")) or ((.description // "" | ascii_downcase | test("frustration|rocket takeover|team go rocket takeover|forget frustration|remove frustration")))) | select((.start_time <= ($now | tonumber)) and (.end_time >= ($now | tonumber)))] | length')
          if [ "$ACTIVE" -gt 0 ]; then
            echo "active=true" >> $GITHUB_OUTPUT
            EVENT_INFO=$(echo "$EVENTS" | jq -r --arg now "$NOW" '[.[] | .[] | select((.title // "" | ascii_downcase | test("frustration|rocket takeover|team go rocket takeover|forget frustration|remove frustration")) or ((.description // "" | ascii_downcase | test("frustration|rocket takeover|team go rocket takeover|forget frustration|remove frustration")))) | select((.start_time <= ($now | tonumber)) and (.end_time >= ($now | tonumber)))] | first | "Event: \(.title)\nStart: \(.start_time)\nEnd: \(.end_time)"')
            echo "event_info<<EOF" >> $GITHUB_OUTPUT
            echo "$EVENT_INFO" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "active=false" >> $GITHUB_OUTPUT
          fi
      - name: Send Email Notification
        if: steps.check.outputs.active == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-mail.outlook.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Pokemon GO: You Can Remove Frustration NOW!"
          to: kmandelos@outlook.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Good news! A Frustration removal event is currently ACTIVE in Pokemon GO!
            ${{ steps.check.outputs.event_info }}
            You can now TM away Frustration from your Shadow Pokemon!
            Check your site: https://dmandelas2-png.github.io/can-i-remove-frustration
            This is an automated notification from your GitHub Actions workflow.
