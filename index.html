<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Can I Remove Frustration? - Pokemon GO</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background-color 0.5s ease;padding:20px}body.yes{background:linear-gradient(135deg,#1a5e1a,#2d8a2d,#1a5e1a)}body.no{background:linear-gradient(135deg,#5e1a1a,#8a2d2d,#5e1a1a)}body.loading{background:linear-gradient(135deg,#1a1a3e,#2d2d5e,#1a1a3e)}.container{text-align:center;max-width:600px;width:100%}h1{color:#fff;font-size:1.5rem;margin-bottom:30px;text-shadow:0 2px 4px rgba(0,0,0,0.3)}.status-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;padding:40px;box-shadow:0 8px 32px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2)}.question{color:rgba(255,255,255,0.9);font-size:1.2rem;margin-bottom:20px}.answer{font-size:4rem;font-weight:900;margin:20px 0;text-shadow:0 4px 8px rgba(0,0,0,0.3)}.answer.yes{color:#4cff4c}.answer.no{color:#ff4c4c}.answer.loading{color:#4c9cff;font-size:2rem}.event-info{color:rgba(255,255,255,0.85);font-size:1rem;margin-top:15px;line-height:1.6}.event-name{font-weight:bold;color:#fff}.event-time{font-size:0.9rem;color:rgba(255,255,255,0.7);margin-top:8px}.last-updated{color:rgba(255,255,255,0.5);font-size:0.8rem;margin-top:30px}.info-footer{color:rgba(255,255,255,0.6);font-size:0.75rem;margin-top:20px;line-height:1.5}.info-footer a{color:rgba(255,255,255,0.8);text-decoration:underline}.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}.icon{font-size:3rem;margin-bottom:10px}</style></head><body class="loading"><div class="container"><h1>&#9889; Pokemon GO Frustration Removal Checker</h1><div class="status-card"><div class="question">Can I remove Frustration from Shadow Pokemon right now?</div><div id="icon" class="icon">&#8987;</div><div id="answer" class="answer loading pulse">Checking...</div><div id="event-info" class="event-info"></div><div id="event-time" class="event-time"></div></div><div id="last-updated" class="last-updated"></div><div class="info-footer">Data from <a href="https://github.com/zhenga8533/leak-duck" target="_blank">leak-duck</a> (LeekDuck scraper) &#8226; Updates every 5 minutes<br>Frustration can only be removed during Team GO Rocket Takeover events.</div></div><script>const DATA_URL="https://raw.githubusercontent.com/zhenga8533/leak-duck/data/events.json";const CHECK_INTERVAL=5*60*1000;const FRUSTRATION_KEYWORDS=["frustration","rocket takeover","team go rocket takeover","forget frustration","remove frustration"];function isRocketEvent(e){var t=(e.title||"").toLowerCase(),d=(e.description||"").toLowerCase(),c=(e.category||"").toLowerCase(),b=(e.details&&e.details.bonuses)?e.details.bonuses.join(" ").toLowerCase():"",a=t+" "+d+" "+c+" "+b;for(var k of FRUSTRATION_KEYWORDS){if(a.includes(k))return{match:true}}if(t.includes("rocket")||t.includes("takeover"))return{match:true};if(c.includes("team go rocket")||c.includes("shadow")){if(t.includes("rocket")||t.includes("shadow")||t.includes("takeover"))return{match:true}}return{match:false}}function isEventActive(e){var n=new Date(),s=new Date(e.start_time),d=new Date(e.end_time);return n>=s&&n<=d}function formatDate(s){if(!s)return"";return new Date(s).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"})}function escapeHtml(t){var d=document.createElement("div");d.textContent=t;return d.innerHTML}async function checkFrustration(){try{var r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-cache"});if(!r.ok)throw new Error("HTTP "+r.status);var data=await r.json();var active=null,upcoming=null;for(var[k,evts]of Object.entries(data)){if(!Array.isArray(evts))continue;for(var ev of evts){if(isRocketEvent(ev).match){if(isEventActive(ev)){active=ev;break}else{var st=new Date(ev.start_time);if(st>new Date()&&(!upcoming||st<new Date(upcoming.start_time)))upcoming=ev}}}if(active)break}for(var ck of Object.keys(data)){var cl=ck.toLowerCase();if(cl.includes("rocket")||cl.includes("takeover")){var evs=data[ck];if(Array.isArray(evs)){for(var e of evs){if(isEventActive(e)){active=e;break}}}}}updateUI(active,upcoming)}catch(err){console.error(err);document.getElementById("answer").textContent="ERROR";document.getElementById("event-info").textContent="Failed to fetch. Will retry in 5 min."}document.getElementById("last-updated").textContent="Last checked: "+new Date().toLocaleTimeString()}function updateUI(active,upcoming){var a=document.getElementById("answer"),i=document.getElementById("event-info"),t=document.getElementById("event-time"),ic=document.getElementById("icon");a.classList.remove("pulse");if(active){document.body.className="yes";a.textContent="YES!";a.className="answer yes";ic.innerHTML="&#10004;";i.innerHTML="<span class=event-name>"+escapeHtml(active.title)+"</span> is active!";t.textContent="Ends: "+formatDate(active.end_time)}else{document.body.className="no";a.textContent="NO";a.className="answer no";ic.innerHTML="&#10008;";if(upcoming){i.innerHTML="Next: <span class=event-name>"+escapeHtml(upcoming.title)+"</span>";t.textContent="Starts: "+formatDate(upcoming.start_time)}else{i.textContent="No Team GO Rocket Takeover event is currently active or scheduled.";t.textContent="Check back later."}}}checkFrustration();setInterval(checkFrustration,CHECK_INTERVAL);</script></body></html>
